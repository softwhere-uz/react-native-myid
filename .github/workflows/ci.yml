name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Docs-only changes (README*, docs/, CHANGELOG, …) and version-only release
  # bumps skip the native builds and prebuild assertions below. GitHub counts
  # skipped jobs as satisfied for required status checks, so branch protection
  # keeps working. `checks` always runs so every PR reports at least one real
  # green status.
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code == 'true' || steps.manifest.outputs.code == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'plugin/**'
              - 'ios/**'
              - 'android/**'
              - 'example/**'
              - 'scripts/**'
              - 'internal/**'
              - 'app.plugin.js'
              - 'expo-module.config.json'
              - 'tsconfig.json'
              - 'eslint.config.cjs'
              - '.github/workflows/**'
            manifest:
              - 'package.json'
              - 'package-lock.json'
      # package.json/lockfile changes count as code UNLESS the only difference
      # is the version field (a release bump) — dependency changes still build.
      - name: Classify manifest changes (version-only bump vs real change)
        id: manifest
        if: steps.filter.outputs.manifest == 'true'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
            git fetch --quiet origin "${{ github.base_ref }}"
          else
            base="${{ github.event.before }}"
          fi
          if ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            echo "code=true" >> "$GITHUB_OUTPUT"; exit 0   # unknown base: build
          fi
          verdict=$(node -e '
            const { execSync } = require("child_process");
            const base = process.argv[1];
            const at = (ref, f) => { try { return JSON.parse(execSync(`git show ${ref}:${f}`, { encoding: "utf8" })); } catch { return null; } };
            const stripPkg = (p) => { if (!p) return p; const c = structuredClone(p); delete c.version; return c; };
            const stripLock = (l) => { if (!l) return l; const c = structuredClone(l); delete c.version; if (c.packages && c.packages[""]) delete c.packages[""].version; return c; };
            const eq = (a, b) => JSON.stringify(a) === JSON.stringify(b);
            const pkgSame = eq(stripPkg(at(base, "package.json")), stripPkg(at("HEAD", "package.json")));
            const lockSame = eq(stripLock(at(base, "package-lock.json")), stripLock(at("HEAD", "package-lock.json")));
            console.log(pkgSame && lockSame ? "version-only" : "code");
          ' "$base")
          echo "manifest classification: $verdict"
          [ "$verdict" = "version-only" ] && echo "code=false" >> "$GITHUB_OUTPUT" || echo "code=true" >> "$GITHUB_OUTPUT"

  checks:
    name: Lint · Typecheck · Build · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run build:plugin
      - run: npm run test:ci

  plugin-prebuild:
    name: Config plugin · prebuild assertions + JS bundle
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build && npm run build:plugin
      - name: Install example dependencies
        working-directory: example
        run: npm ci
      - name: expo prebuild (Continuous Native Generation, no native install)
        working-directory: example
        run: npx expo prebuild --no-install --clean
      - name: Assert config-plugin mods were applied
        run: node scripts/assert-prebuild.mjs
      - name: Metro bundle smoke test (iOS + Android)
        working-directory: example
        run: |
          npx expo start --port 8081 > /tmp/metro.log 2>&1 &
          server=$!
          trap 'kill $server 2>/dev/null || true' EXIT
          fail=0
          for platform in ios android; do
            code=$(curl -s --retry 60 --retry-delay 2 --retry-connrefused \
              -o "/tmp/$platform.bundle.js" -w '%{http_code}' \
              "http://localhost:8081/index.bundle?platform=$platform&dev=true&minify=false")
            if [ "$code" != "200" ]; then
              echo "::error::$platform bundle returned HTTP $code"; head -c 500 "/tmp/$platform.bundle.js"; fail=1; continue
            fi
            if ! grep -q "Verify with MyID" "/tmp/$platform.bundle.js"; then
              echo "::error::$platform bundle is missing the example code"; fail=1; continue
            fi
            echo "$platform bundle OK ($(wc -c < "/tmp/$platform.bundle.js") bytes)"
          done
          exit $fail

  ios:
    name: iOS · compile against MyIdSDK (simulator)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build && npm run build:plugin
      - name: Install example dependencies
        working-directory: example
        run: npm ci
      - name: expo prebuild iOS + pod install (pulls MyIdSDK from CocoaPods trunk)
        working-directory: example
        run: |
          npx expo prebuild -p ios --no-install
          cd ios && pod install
      - name: Build the MyId pod (Swift compiles against MyIdSDK, no signing)
        working-directory: example/ios
        run: |
          xcodebuild -project Pods/Pods.xcodeproj -target MyId \
            -sdk iphonesimulator -configuration Debug \
            CODE_SIGNING_ALLOWED=NO build

  android:
    name: Android · assembleDebug against MyID SDK
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm ci
      - run: npm run build && npm run build:plugin
      - name: Install example dependencies
        working-directory: example
        run: npm ci
      - name: expo prebuild Android (config plugin adds the MyID Maven repo)
        working-directory: example
        run: npx expo prebuild -p android --no-install
      - name: Gradle assembleDebug (resolves + compiles against myid-capture-sdk)
        working-directory: example/android
        run: ./gradlew :app:assembleDebug --no-daemon
